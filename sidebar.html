<style>
    /* Style for the menu icon (☰) that opens the sidebar */
    .menu-icon {
        position: fixed;      /* keeps the icon in the same place even when scrolling */
        top: 20px;            /* distance from the top of the screen */
        right: 20px;          /* distance from the right side of the screen */
        font-size: 28px;      /* size of the icon */
        cursor: pointer;      /* changes cursor to show it is clickable */
        z-index: 1001;        /* makes sure the icon appears above other elements */
    }

    /* Sidebar panel that slides in from the side */
    .sidebar-content {
        position: fixed;      /* keeps the sidebar attached to the screen */
        top: 0;               /* start from the top of the page */
        
        right: -25vw;         /* moves the sidebar off-screen so it is hidden by default */
        width: 25vw;          /* width of the sidebar (you can change this) */
        
        max-width: 250px;     /* prevents the sidebar from getting too wide */
        min-width: 160px;     /* prevents it from getting too small */

        height: 100vh;        /* makes the sidebar fill the full screen height */
        
        background: white;    /* background color of the sidebar */
        box-shadow: -4px 0 10px rgba(0,0,0,0.2); /* shadow to separate it from the page */
        
        padding-top: 60px;    /* space at the top for the menu icon area */

        transition: right 0.3s ease; /* creates a smooth sliding animation */

        z-index: 1000;        /* layer order (slightly below the menu icon) */

        overflow-y: auto;     /* allows scrolling if there are many links */

        box-sizing: border-box; /* keeps padding inside the width calculation */
    }

    /* Style for links inside the sidebar */
    .sidebar-content a {
        display: block;           /* makes each link take up a full row */
        padding: 15px 20px;       /* spacing around the link text */
        text-decoration: none;    /* removes underline from links */
        font-size: 18px;          /* size of the link text */
        color: #4e4e4e;           /* text color */
    }

    /* Effect when the user hovers over a link */
    .sidebar-content a:hover {
        background: #f5f5f5;      /* highlight the link on hover */
    }

    /* When the sidebar has the "open" class it moves back onto the screen */
    .sidebar-content.open {
        right: 0;                 /* slides the sidebar into view */
    }

</style>

<head>
    <meta charset="UTF-8">
</head>

<body >
    <div class= "sidebar">
        <div class= "menu-icon" onclick= "toggleMenu()">☰</div>
        <div id= "sidebar-content" class= "sidebar-content">
            <a href="./servicegroups/example/index.php">Group Name</a>
            <a href="./servicegroups/example/index.php">Group Name</a>
            <a href="./servicegroups/example/index.php">Group Name</a>
            <a href="./servicegroups/example/index.php">Group Name</a>
            <a href="./servicegroups/example/index.php">Group Name</a>
        </div>
        <script> 

        function openMenu() {
            document.getElementById("sidebar-content").classList.add("open");
        }

        function closeMenu() {
            document.getElementById("sidebar-content").classList.remove("open");
        }

        const menuicon = document.querySelector('.menu-icon');
        menuicon.addEventListener('mouseenter', openMenu);

        const sidebar = document.querySelector('.sidebar');
        sidebar.addEventListener('mouseleave', closeMenu);

        </script>
    </div>
</body>
